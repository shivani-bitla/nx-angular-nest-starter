# docker-compose.yml

services:
  postgres:
    image: postgres:17

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fullstack

    ports:
      - mode: ingress
        target: 5432
        published: "5432"
        protocol: tcp

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: